version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PLAUSIBLE_API_KEY=${PLAUSIBLE_API_KEY:-}
    volumes:
      - opscontent-data:/app/data

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  opscontent-data:
